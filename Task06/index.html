<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Laundry Mart login page</title>
</head>
<body>
    <div class="container">
        <div class="sec" id="sec-1">
            <img src="https://tse4.mm.bing.net/th/id/OIP.e06fRQRf3wnXhpbu6IxlRQHaHa?r=0&cb=thfvnextfalcon2&w=580&h=580&rs=1&pid=ImgDetMain&o=7&rm=3" alt="">
        </div>

        <div class="sec" id="sec-2">
            <h1 id="heading">Hello Again!</h1>
            <p id="wel">Welcome back! We missed you!<p><br>
            <form action="">
                <label for="email">Email</label><br>
                <input type="email" name="email" id="email" placeholder="Emailid@site.com">
                <br><br>
                <label for="pass">Password</label><br>
                <input type="password" name="pass" id="pass" placeholder="Password">
                <p id="forgot">Forgot Password</p><br>

                <button id="bt">Login</button><br><br><br>
                <p id="p1">Not a member?<a href="#">Register Now</a></p>
            </form>
        </div>
    </div>
</body>
</html>
